<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%" style="background:#f1f5f9;border-radius:6px;border:1px solid #cbd5e1;">
    <!-- Large Header -->
    <rect x="20" y="20" width="150" height="24" rx="4" fill="#94a3b8"/>
    
    <!-- Filters Horizontal (No Sidebar) -->
    <rect x="20" y="60" width="60" height="20" rx="4" fill="#e2e8f0"/>
    <rect x="90" y="60" width="60" height="20" rx="4" fill="#e2e8f0"/>
    <rect x="160" y="60" width="60" height="20" rx="4" fill="#e2e8f0"/>
    
    <!-- Grid elements 4 cols -->
    <!-- Row 1 -->
    <rect x="20" y="100" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="20" y="100" width="80" height="45" rx="4" fill="#cbd5e1"/>
    
    <rect x="110" y="100" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="110" y="100" width="80" height="45" rx="4" fill="#cbd5e1"/>

    <rect x="200" y="100" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="200" y="100" width="80" height="45" rx="4" fill="#cbd5e1"/>

    <rect x="290" y="100" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="290" y="100" width="80" height="45" rx="4" fill="#cbd5e1"/>

    <!-- Row 2 -->
    <rect x="20" y="195" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="20" y="195" width="80" height="45" rx="4" fill="#cbd5e1"/>

    <rect x="110" y="195" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="110" y="195" width="80" height="45" rx="4" fill="#cbd5e1"/>

    <rect x="200" y="195" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="200" y="195" width="80" height="45" rx="4" fill="#cbd5e1"/>

    <rect x="290" y="195" width="80" height="85" rx="4" fill="#fff"/>
    <rect x="290" y="195" width="80" height="45" rx="4" fill="#cbd5e1"/>
</svg>
