<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%" style="background:#f1f5f9;border-radius:6px;border:1px solid #cbd5e1;">
    <!-- Minimal header -->
    <rect x="20" y="15" width="80" height="12" rx="2" fill="#94a3b8"/>
    <line x1="20" y1="40" x2="380" y2="40" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Sidebar Left -->
    <rect x="20" y="60" width="80" height="200" rx="4" fill="#e2e8f0"/>
    
    <!-- Grid elements -->
    <rect x="120" y="60" width="80" height="90" rx="4" fill="#fff"/>
    <rect x="120" y="60" width="80" height="50" rx="4" fill="#cbd5e1"/>
    
    <rect x="210" y="60" width="80" height="90" rx="4" fill="#fff"/>
    <rect x="210" y="60" width="80" height="50" rx="4" fill="#cbd5e1"/>

    <rect x="300" y="60" width="80" height="90" rx="4" fill="#fff"/>
    <rect x="300" y="60" width="80" height="50" rx="4" fill="#cbd5e1"/>

    <rect x="120" y="170" width="80" height="90" rx="4" fill="#fff"/>
    <rect x="120" y="170" width="80" height="50" rx="4" fill="#cbd5e1"/>

    <rect x="210" y="170" width="80" height="90" rx="4" fill="#fff"/>
    <rect x="210" y="170" width="80" height="50" rx="4" fill="#cbd5e1"/>

    <rect x="300" y="170" width="80" height="90" rx="4" fill="#fff"/>
    <rect x="300" y="170" width="80" height="50" rx="4" fill="#cbd5e1"/>
</svg>
