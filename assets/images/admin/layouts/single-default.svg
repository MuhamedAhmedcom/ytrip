<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%" style="background:#f1f5f9;border-radius:6px;border:1px solid #cbd5e1;">
    <!-- Default WP Page Header -->
    <rect x="0" y="0" width="400" height="30" fill="#fff"/>
    <rect x="20" y="10" width="60" height="10" rx="2" fill="#e2e8f0"/>
    
    <!-- Content Area -->
    <rect x="20" y="50" width="120" height="16" rx="4" fill="#94a3b8"/>
    
    <rect x="20" y="80" width="240" height="180" rx="4" fill="#fff"/>
    <rect x="35" y="95" width="210" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="35" y="110" width="180" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="35" y="130" width="210" height="80" rx="4" fill="#e2e8f0"/>
    
    <!-- Booking Box (Bottom Left/Content) -->
    
    <!-- Sidebar -->
    <rect x="280" y="80" width="100" height="120" rx="4" fill="#fff"/>
    <rect x="290" y="100" width="80" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="290" y="120" width="80" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="290" y="140" width="50" height="6" rx="2" fill="#cbd5e1"/>
</svg>
