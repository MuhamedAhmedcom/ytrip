<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%" style="background:#f1f5f9;border-radius:6px;border:1px solid #cbd5e1;">
    <!-- Large Hero -->
    <rect x="0" y="0" width="400" height="110" fill="#94a3b8"/>
    
    <rect x="20" y="60" width="180" height="20" rx="2" fill="#fff"/>
    <rect x="20" y="85" width="120" height="8" rx="2" fill="#fff" opacity="0.8"/>
    
    <!-- Floating booking card -->
    <rect x="260" y="50" width="120" height="180" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="280" y="70" width="80" height="40" rx="4" fill="#e2e8f0"/>
    <rect x="280" y="120" width="80" height="8" rx="2" fill="#cbd5e1"/>
    <rect x="280" y="135" width="80" height="8" rx="2" fill="#cbd5e1"/>
    <rect x="280" y="150" width="80" height="8" rx="2" fill="#cbd5e1"/>
    <rect x="280" y="180" width="80" height="30" rx="4" fill="#2563eb"/>

    <!-- Content (under hero) -->
    <rect x="20" y="130" width="220" height="150" rx="4" fill="#fff"/>
    <rect x="40" y="150" width="100" height="8" rx="2" fill="#cbd5e1"/>
    <rect x="40" y="170" width="160" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="40" y="185" width="140" height="6" rx="2" fill="#cbd5e1"/>
    
    <!-- Gallery thumb -->
    <rect x="40" y="210" width="160" height="50" rx="4" fill="#e2e8f0"/>
</svg>
